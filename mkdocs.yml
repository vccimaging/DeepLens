site_name: DeepLens
site_url: https://deeplens.readthedocs.io/en/latest/
repo_url: https://github.com/singer-yang/DeepLens
repo_name: singer-yang/DeepLens

docs_dir: docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source
            heading_level: 3
            separate_signature: true
            merge_init_into_class: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list

extra_css:
  - stylesheets/api.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home:
      - Overview: index.md
      - Installation: installation.md
      - Quickstart: quickstart.md
      - Architecture: architecture.md
  - API Reference:
      - Optics: api/optics.md
      - Sensor: api/sensor.md
      - Network: api/network.md
  - Examples: examples.md
  - Contributing: contributing.md
